version: '3.8'
services:
  db:
    image: postgres:13
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=dev2026
      - POSTGRES_DB=laborwaze
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/laborwaze
      - DB_USERNAME=postgres
      - DB_PASSWORD=dev2026
      - JWT_SECRET=troque-em-producao
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data: